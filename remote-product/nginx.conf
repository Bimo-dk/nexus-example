server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ----- Security headers -----
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ----- CORS for Nexus consumers -----
  # Host og app skal kunne fetche remoteEntry.json + chunks fra denne origin.
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type, X-Nexus-Token" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # ----- Health endpoint (ingen auth) -----
  location = /health {
    default_type application/json;
    return 200 '{"status":"ok","remote":"remoteOne"}';
  }

  # ----- Federation entry: ingen cache -----
  location ~* remoteEntry\.(json|js)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }

  # ----- Federation chunks: ingen cache (de skifter ved hver build) -----
  location ~* /(chunk|remote)-[^/]+\.js$ {
    add_header Cache-Control "no-store" always;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }

  # ----- Statiske assets: lang cache -----
  location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }

  # ----- SPA fallback -----
  location / {
    try_files $uri $uri/ /index.html;
  }
}
