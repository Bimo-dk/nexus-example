name: nexus-example

# ============================================================================
# Bimo-Nexus example — developer playground
#
# Pre-byggede images pulles fra ghcr.io (nexus-registry, nexus-portal, nexus-gateway).
# Host + 2 remotes bygges LOKALT fra ./host, ./remote-one, ./remote-two — så du
# kan editere dem og se ændringer ved `docker compose up --build <service>`.
#
# Krævet i .env:
#   NEXUS_TOKEN       valgfri token-værdi (alle services skal være enige)
#   NODE_AUTH_TOKEN   PAT med read:packages — kun til lokal host-build (henter
#                     @bimo-dk/nexus-core fra GitHub Packages)
# ============================================================================

services:
  # ===== PRE-BUILT (pulles fra ghcr.io) =====

  registry:
    image: ghcr.io/bimo-dk/nexus-registry:latest
    container_name: nexus-example-registry
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      ALLOWED_ORIGINS: '*'
      # Format: name=url,name=url. Registry pinger disse hvert HEALTH_CHECK_INTERVAL_MS
      SYSTEM_SERVICES: gateway=http://gateway/health,host=http://host/health,portal=http://portal/health
      HEALTH_CHECK_INTERVAL_MS: '30000'
    volumes:
      - registry-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus-net
    restart: unless-stopped

  portal:
    image: ghcr.io/bimo-dk/nexus-portal:latest
    container_name: nexus-example-portal
    ports:
      - "8669:80"
    environment:
      # Runtime config — substitueres ind i /assets/config.json ved container-start
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token-change-in-production}
      REGISTRY_URL: /api
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

  gateway:
    image: ghcr.io/bimo-dk/nexus-gateway:latest
    container_name: nexus-example-gateway
    ports:
      - "8668:80"
    environment:
      # Runtime config — gateway substituerer disse ind i /assets/config.json
      HOST_REMOTE_ENTRY: /host/remoteEntry.json
      HOST_EXPOSED_MODULE: ./AppShell
    depends_on:
      registry:
        condition: service_healthy
      host:
        condition: service_started
      remote-one:
        condition: service_started
      remote-two:
        condition: service_started
    networks:
      - nexus-net
    restart: unless-stopped

  # ===== LOKALT BYGGEDE (editérbare for udvikleren) =====

  host:
    build:
      context: ./host
      args:
        NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      secrets:
        - node_auth_token
    container_name: nexus-example-host
    expose:
      - "80"
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

  remote-one:
    build: ./remote-one
    container_name: nexus-example-remote-one
    expose:
      - "80"
    networks:
      - nexus-net
    restart: unless-stopped

  remote-two:
    build: ./remote-two
    container_name: nexus-example-remote-two
    expose:
      - "80"
    networks:
      - nexus-net
    restart: unless-stopped

volumes:
  registry-data:
    driver: local

networks:
  nexus-net:
    driver: bridge

# BuildKit secrets — token læses fra .env's NODE_AUTH_TOKEN, mountes ind i build
# men gemmes ALDRIG i image-layer eller build-log.
secrets:
  node_auth_token:
    environment: NODE_AUTH_TOKEN
