name: nexus-example

# ============================================================================
# Bimo-Nexus example — developer playground
#
# Pre-built images are pulled from ghcr.io (nexus-registry, nexus-portal, nexus-gateway).
# Host + 2 remotes are built LOCALLY from ./host, ./remote-one, ./remote-two — so you
# can edit them and see changes via `docker compose up --build <service>`.
#
# Required in .env:
#   NEXUS_TOKEN       optional token value (all services must agree)
#   NODE_AUTH_TOKEN   PAT with read:packages — only for the local host build (fetches
#                     @bimo-dk/nexus-core from GitHub Packages)
# ============================================================================

services:
  # ===== PRE-BUILT (pulled from ghcr.io) =====

  registry:
    image: ghcr.io/bimo-dk/nexus-registry:latest
    container_name: nexus-example-registry
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      ALLOWED_ORIGINS: '*'
      # Format: name=url,name=url. Registry pings these every HEALTH_CHECK_INTERVAL_MS
      SYSTEM_SERVICES: gateway=http://gateway/health,host=http://host/health,portal=http://portal/health
      HEALTH_CHECK_INTERVAL_MS: '30000'
    volumes:
      - registry-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus-net
    restart: unless-stopped

  portal:
    image: ghcr.io/bimo-dk/nexus-portal:latest
    container_name: nexus-example-portal
    ports:
      - "8669:80"
    environment:
      # Runtime config — substituted into /assets/config.json at container start
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token-change-in-production}
      REGISTRY_URL: /api
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

  gateway:
    image: ghcr.io/bimo-dk/nexus-gateway:latest
    container_name: nexus-example-gateway
    ports:
      - "8668:80"
    environment:
      # Runtime config — gateway substitutes these into /assets/config.json
      HOST_REMOTE_ENTRY: /host/remoteEntry.json
      HOST_EXPOSED_MODULE: ./AppShell
      # Dynamic remote routing — gateway fetches registered remotes from registry
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
    depends_on:
      registry:
        condition: service_healthy
      host:
        condition: service_started
      remote-one:
        condition: service_started
      remote-two:
        condition: service_started
    networks:
      - nexus-net
    restart: unless-stopped

  # ===== BUILT LOCALLY (editable by the developer) =====

  host:
    build:
      context: ./host
      args:
        NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      secrets:
        - node_auth_token
    container_name: nexus-example-host
    expose:
      - "80"
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

  remote-one:
    build:
      context: ./remote-one
      secrets:
        - node_auth_token
    container_name: nexus-example-remote-one
    expose:
      - "80"
    environment:
      REGISTRY_URL: /api
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: http://localhost:8668/remotes/remoteOne/remoteEntry.json
      UPSTREAM_URL: http://remote-one:80
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

  remote-two:
    build:
      context: ./remote-two
      secrets:
        - node_auth_token
    container_name: nexus-example-remote-two
    expose:
      - "80"
    environment:
      REGISTRY_URL: /api
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: http://localhost:8668/remotes/remoteTwo/remoteEntry.json
      UPSTREAM_URL: http://remote-two:80
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - nexus-net
    restart: unless-stopped

volumes:
  registry-data:
    driver: local

networks:
  nexus-net:
    driver: bridge

# BuildKit secrets — token is read from .env's NODE_AUTH_TOKEN, mounted into the build
# but NEVER stored in image layers or build logs.
secrets:
  node_auth_token:
    environment: NODE_AUTH_TOKEN
