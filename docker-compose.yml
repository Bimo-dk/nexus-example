name: nexusshop

# ============================================================================
# NexusShop — Bimo-Nexus webshop demo
#
# Pre-built images are pulled from ghcr.io (nexus-registry, nexus-portal, nexus-gateway).
# Host + 5 remotes are built LOCALLY — edit them and rebuild with:
#   docker compose up --build <service>
#
# Required in .env:
#   NEXUS_TOKEN       shared secret (all services must agree)
#   NODE_AUTH_TOKEN   PAT with read:packages — needed to install @bimo-dk/* packages
# ============================================================================

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  registry:
    image: ghcr.io/bimo-dk/nexus-registry:latest
    container_name: nexusshop-registry
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      ALLOWED_ORIGINS: http://localhost:8668,http://localhost:8669
      SYSTEM_SERVICES: gateway=http://gateway/health,host=http://host/health,portal=http://portal/health
      HEALTH_CHECK_INTERVAL_MS: '30000'
    volumes:
      - registry-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nexus-net
    restart: unless-stopped

  gateway:
    image: ghcr.io/bimo-dk/nexus-gateway:latest
    container_name: nexusshop-gateway
    ports:
      - "8668:80"
    environment:
      HOST_REMOTE_ENTRY: /host/remoteEntry.json
      HOST_EXPOSED_MODULE: ./AppShell
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  portal:
    image: ghcr.io/bimo-dk/nexus-portal:latest
    container_name: nexusshop-portal
    ports:
      - "8669:80"
    environment:
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      REGISTRY_URL: /api
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  # ── Host ───────────────────────────────────────────────────────────────────

  host:
    build:
      context: ./host
      args:
        NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      secrets:
        - node_auth_token
    container_name: nexusshop-host
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  # ── Remotes ────────────────────────────────────────────────────────────────

  remote-catalog:
    build:
      context: ./remote-catalog
      secrets:
        - node_auth_token
    container_name: nexusshop-catalog
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: /remotes/catalog/remoteEntry.json
      UPSTREAM_URL: http://remote-catalog:80
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  remote-cart:
    build:
      context: ./remote-cart
      secrets:
        - node_auth_token
    container_name: nexusshop-cart
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: /remotes/cart/remoteEntry.json
      UPSTREAM_URL: http://remote-cart:80
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  remote-product:
    build:
      context: ./remote-product
      secrets:
        - node_auth_token
    container_name: nexusshop-product
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: /remotes/product/remoteEntry.json
      UPSTREAM_URL: http://remote-product:80
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  remote-checkout:
    build:
      context: ./remote-checkout
      secrets:
        - node_auth_token
    container_name: nexusshop-checkout
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: /remotes/checkout/remoteEntry.json
      UPSTREAM_URL: http://remote-checkout:80
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

  remote-account:
    build:
      context: ./remote-account
      secrets:
        - node_auth_token
    container_name: nexusshop-account
    expose:
      - "80"
    environment:
      REGISTRY_INTERNAL_URL: http://registry:3000
      NEXUS_TOKEN: ${NEXUS_TOKEN:-dev-token}
      PUBLIC_URL: /remotes/account/remoteEntry.json
      UPSTREAM_URL: http://remote-account:80
    depends_on:
      registry: { condition: service_healthy }
    networks:
      - nexus-net
    restart: unless-stopped

volumes:
  registry-data:
    driver: local

networks:
  nexus-net:
    driver: bridge

# BuildKit secrets — token is read from .env's NODE_AUTH_TOKEN, mounted into
# the build but NEVER stored in image layers or build logs.
secrets:
  node_auth_token:
    environment: NODE_AUTH_TOKEN
