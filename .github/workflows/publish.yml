name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        remote: [remote-one, remote-two]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.remote }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.remote }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.remote }}
          cache-to: type=gha,mode=max,scope=${{ matrix.remote }}

# Resultatet (begge remotes pr. push):
#   docker pull ghcr.io/bimo-dk/nexus-example/remote-one:latest
#   docker pull ghcr.io/bimo-dk/nexus-example/remote-two:latest
