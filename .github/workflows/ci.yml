name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        remote: [remote-one, remote-two]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ matrix.remote }}/package-lock.json
      - working-directory: ${{ matrix.remote }}
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - working-directory: ${{ matrix.remote }}
        run: npm run build:prod
